<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ATC Simulator</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <script src="wasm_exec.js"></script>
    <script>
        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("game.wasm"), go.importObject)
            .then(result => go.run(result.instance));
    </script>
</body>
</html>
