name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build WASM
        run: GOOS=js GOARCH=wasm go build -ldflags="-s -w" -o site/game.wasm .

      - name: Copy WASM glue JS
        run: cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" site/ 2>/dev/null || cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" site/

      - name: Copy index.html
        run: cp docs/index.html site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
